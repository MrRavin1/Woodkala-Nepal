services:
  - type: web
    name: woodkala-nepal
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: Wood Kala Nepal
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://woodkala-nepal.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: woodkala-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: LOG_LEVEL
        value: error
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        value: 29rabinkarki@gmail.com
      - key: MAIL_PASSWORD
        value: zazsxtnmpmwmqntd
      - key: MAIL_FROM_ADDRESS
        value: 29rabinkarki@gmail.com
      - key: MAIL_FROM_NAME
        value: Wood Kala Nepal

databases:
  - name: woodkala-db
    databaseName: woodkala
    user: woodkala
